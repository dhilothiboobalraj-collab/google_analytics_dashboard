<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="SocialPulse — Real-time Social Media Analytics Dashboard"/>
  <title>SocialPulse — Analytics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <link rel="stylesheet" href="/static/css/dashboard.css"/>
</head>
<body>

  <!-- ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="loader-ring"><div class="loader-ring-inner"></div></div>
    <div class="loader-text">
      <span id="loadingMsg">Fetching live data</span>
      <span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>

  <!-- ══ SIDEBAR ══════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <circle cx="15" cy="15" r="15" fill="url(#lg1)"/>
          <path d="M8 15 Q15 6 22 15 Q15 24 8 15Z" fill="white" opacity="0.9"/>
          <defs><linearGradient id="lg1" x1="0" y1="0" x2="30" y2="30">
            <stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#f093fb"/>
          </linearGradient></defs>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">SocialPulse</span>
        <span class="brand-sub">Analytics</span>
      </div>
    </div>

    <div class="sidebar-live-badge">
      <span class="live-dot"></span>
      <span>LIVE</span>
      <span id="liveClock" class="live-clock"></span>
    </div>

    <nav class="sidebar-nav">
      <button class="tab-btn active" data-tab="overview" id="tab-overview">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        <span class="tab-label">Overview</span>
        <span class="tab-pill" id="pill-overview"></span>
      </button>
      <button class="tab-btn" data-tab="postperformance" id="tab-postperformance">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
        <span class="tab-label">Post Performance</span>
        <span class="tab-pill" id="pill-postperformance"></span>
      </button>
      <button class="tab-btn" data-tab="weekly" id="tab-weekly">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="tab-label">Weekly</span>
        <span class="tab-pill" id="pill-weekly"></span>
      </button>
      <button class="tab-btn" data-tab="monthly" id="tab-monthly">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/></svg></span>
        <span class="tab-label">Monthly</span>
        <span class="tab-pill" id="pill-monthly"></span>
      </button>
      <button class="tab-btn" data-tab="trend" id="tab-trend">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span>
        <span class="tab-label">Trend</span>
        <span class="tab-pill" id="pill-trend"></span>
      </button>
      <button class="tab-btn ai-tab" data-tab="aiinsights" id="tab-aiinsights">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></span>
        <span class="tab-label">AI Insights</span>
        <span class="tab-pill ai-pill" id="pill-aiinsights"></span>
      </button>

      <div class="nav-section-label">Deep Analysis</div>

      <button class="tab-btn" data-tab="besttime" id="tab-besttime">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <span class="tab-label">Best Posting Time</span>
        <span class="tab-pill" id="pill-besttime"></span>
      </button>
      <button class="tab-btn" data-tab="platformcomparison" id="tab-platformcomparison">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></span>
        <span class="tab-label">Platform Compare</span>
        <span class="tab-pill" id="pill-platformcomparison"></span>
      </button>
      <button class="tab-btn" data-tab="reachanalysis" id="tab-reachanalysis">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <span class="tab-label">Reach Analysis</span>
        <span class="tab-pill" id="pill-reachanalysis"></span>
      </button>
      <button class="tab-btn" data-tab="recentposts" id="tab-recentposts">
        <span class="tab-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span class="tab-label">Recent Posts</span>
        <span class="tab-pill" id="pill-recentposts"></span>
      </button>
    </nav>

    <div class="sidebar-platforms">
      <div class="sb-plat-title">Audience</div>
      <div class="platform-badge fb-plat">
        <span class="pb-dot" style="background:#4267B2"></span>
        <span class="pb-name">Facebook</span>
        <span class="pb-val" id="sp-fb-val">—</span>
      </div>
      <div class="platform-badge ig-plat">
        <span class="pb-dot" style="background:#E1306C"></span>
        <span class="pb-name">Instagram</span>
        <span class="pb-val" id="sp-ig-val">—</span>
      </div>
      <div class="platform-badge yt-plat">
        <span class="pb-dot" style="background:#FF4040"></span>
        <span class="pb-name">YouTube</span>
        <span class="pb-val" id="sp-yt-val">—</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="refresh-status">
        <div class="refresh-arc">
          <svg viewBox="0 0 36 36" width="38" height="38">
            <circle cx="18" cy="18" r="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
            <circle id="arcCircle" cx="18" cy="18" r="15" fill="none" stroke="url(#ag)" stroke-width="2.5"
              stroke-dasharray="94.2" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 18 18)"/>
            <defs><linearGradient id="ag"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#f093fb"/></linearGradient></defs>
          </svg>
          <span id="countdown" class="arc-label">60</span>
        </div>
        <div class="refresh-info">
          <span class="refresh-lbl">Auto-refresh</span>
          <span class="refresh-sub" id="lastRefreshed">Just now</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══════════════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">
        <h2 class="page-title" id="pageTitle">Overview</h2>
        <span class="page-sub" id="pageSub">All platforms · Live data</span>
      </div>
      <div class="topbar-controls">
        <!-- Time range presets -->
        <div class="time-range-bar" id="timeRangeBar">
          <button class="tr-btn" data-days="7">7D</button>
          <button class="tr-btn" data-days="14">14D</button>
          <button class="tr-btn active" data-days="30">30D</button>
          <button class="tr-btn" data-days="60">60D</button>
          <button class="tr-btn" data-days="90">90D</button>
          <button class="tr-btn" data-days="180">6M</button>
          <button class="tr-btn" data-days="365">1Y</button>
          <button class="tr-btn" data-days="custom">Custom ▾</button>
        </div>
        <!-- Custom date range (hidden by default) -->
        <div class="custom-range" id="customRange" style="display:none;">
          <input type="date" id="dateFrom" aria-label="Start date"/>
          <span class="cr-sep">→</span>
          <input type="date" id="dateTo" aria-label="End date"/>
        </div>
        <!-- Platform filter -->
        <div class="select-wrap">
          <svg class="select-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
          <select id="platformSelect" aria-label="Platform">
            <option value="all">All Platforms</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
          </select>
        </div>
        <button class="btn-refresh" id="refreshBtn" title="Refresh">
          <span class="refresh-icon-svg"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span>
          <span>Refresh</span>
        </button>
      </div>
    </header>

    <!-- Chart area -->
    <section class="chart-area" id="chartArea">
      <div class="placeholder-msg">
        <div class="placeholder-spinner"><div class="ph-ring"></div></div>
        <p>Loading dashboard…</p>
      </div>
    </section>

  </main>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
